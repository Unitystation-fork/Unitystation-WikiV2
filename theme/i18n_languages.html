<style>
    /* Style The Dropdown Button */
    .i18n-dropbtn {
      background-color: #2a2a2a;
      color: #EDEDED;
      border: 1px #797063 solid;
      border-top: none;
      font-size: 12.5px;
      cursor: pointer;
      background-image: none;

    }
    
    /* The container <div> - needed to position the dropdown content */
    .i18n-dropdown {
    height: auto;
    white-space: nowrap;
    background-color: #2A2A2A;
      
    }
    
    /* Dropdown Content (Hidden by Default) */
    .i18n-dropdown-content {
      display: none;
      position: absolute;
      background-color: #2A2A2A;
      min-width: 160px;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
    }
    
    /* Links inside the dropdown */
    .i18n-dropdown-content a {
      color: #EDEDED;
      padding: 6px 8px;
      text-decoration: none;
      display: block;
    }
    
    /* Change color of dropdown links on hover */
    .i18n-dropdown-content a:hover {
        background-color: #474747
    }
    
    /* Show the dropdown menu on hover */
    .i18n-dropdown:hover .i18n-dropdown-content {
      display: block;
    }
    
    /* Change the background color of the dropdown button when the dropdown content is shown */
    .i18n-dropbtn:hover {
      background-color: #2C313A;
    }
    </style>
    <div class="i18n-dropdown wm-vcenter pull-right wm-small-left">
        <button class="i18n-dropbtn btn btn-sm wm-vcentered">Language</button>
        <div class="i18n-dropdown-content">
            {% for lang, display in config.plugins.i18n.config.languages.items() -%}
            <a href="/{{ lang }}/" onclick="set_lang({{lang}})">{{ display.name }}</a>
            {% endfor %}
        </div>
    </div>
